global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers: []  # configure Alertmanager here if using webhook routing

scrape_configs:
  - job_name: btc_api
    static_configs:
      - targets: [api:8000]
    metrics_path: /metrics
